name: Android CI  
on:  
  push:  
    branches: [ "main", "master" ]  
jobs:  
  build:  
    runs-on: ubuntu-latest  
    steps:  
    - uses: actions/checkout@v4  
    - uses: actions/setup-java@v4  
      with: { java-version: '17', distribution: 'temurin' }  
    - uses: subosito/flutter-action@v2  
      with: { channel: 'stable' }  
    - run: flutter create --platforms=android .  
    - run: sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml  
    - run: flutter pub get  
    - run: flutter build apk --release  
    - uses: actions/upload-artifact@v4  
      with: { name: App-Universal-APK, path: build/app/outputs/flutter-apk/app-release.apk }  
